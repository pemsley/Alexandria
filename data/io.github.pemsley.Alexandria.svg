<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Stack of three offset rectangles representing organised papers -->
  <rect x="10" y="14" width="36" height="44" rx="3"
        fill="#e0e0e0" stroke="#888" stroke-width="1.2"/>
  <rect x="14" y="10" width="36" height="44" rx="3"
        fill="#f5f5f5" stroke="#666" stroke-width="1.2"/>
  <rect x="18" y="6"  width="36" height="44" rx="3"
        fill="#ffffff" stroke="#444" stroke-width="1.4"/>

  <!-- Lines on the front sheet -->
  <line x1="22" y1="14" x2="48" y2="14" stroke="#888" stroke-width="1.4"/>
  <line x1="22" y1="20" x2="48" y2="20" stroke="#bbb" stroke-width="1.2"/>
  <line x1="22" y1="26" x2="48" y2="26" stroke="#bbb" stroke-width="1.2"/>
  <line x1="22" y1="32" x2="42" y2="32" stroke="#bbb" stroke-width="1.2"/>

  <!-- Coloured "mark" circle in the corner: matches the in-app mark feature -->
  <circle cx="49" cy="42" r="6" fill="#33aa33"/>
</svg>
