app-id: io.github.pemsley.Alexandria
runtime: org.gnome.Platform
runtime-version: '48'
sdk: org.gnome.Sdk
command: alexandria-browse

finish-args:
  - --share=network          # CrossRef / OpenAlex / arXiv API calls
  - --share=ipc              # X11 shared-memory transport
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri             # GPU acceleration
  - --filesystem=home        # PDF library (default ~/pdfs) + sidecar JSON files

build-options:
  env:
    PIP_DISABLE_PIP_VERSION_CHECK: '1'
    PIP_NO_COMPILE: '1'

modules:

  # ── poppler-data (encoding tables, CMap files) ──────────────────────────
  - name: poppler-data
    buildsystem: cmake-ninja
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
    sources:
      - type: archive
        url: https://poppler.freedesktop.org/poppler-data-0.4.12.tar.gz
        sha256: c835b640a40ce357e1b83666aabd95edffa24ddddd49b8daff63adb851cdab74

  # ── Poppler ──────────────────────────────────────────────────────────────
  # Provides gi.repository.Poppler (viewer, references panel)
  # and /app/bin/pdftotext (metadata extraction pipeline).
  # Not in the GNOME Platform runtime — must be bundled.
  #
  # Fill in sha256 with:
  #   curl -sL https://poppler.freedesktop.org/poppler-24.11.0.tar.xz | sha256sum
  - name: poppler
    buildsystem: cmake-ninja
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
      - -DCMAKE_INSTALL_LIBDIR=lib
      - -DBUILD_GTK_TESTS=OFF
      - -DBUILD_QT5_TESTS=OFF
      - -DBUILD_QT6_TESTS=OFF
      - -DENABLE_BOOST=OFF
      - -DENABLE_CPP=OFF
      - -DENABLE_GLIB=ON
      - -DENABLE_GOBJECT_INTROSPECTION=ON
      - -DENABLE_UTILS=ON
      - -DENABLE_QT5=OFF
      - -DENABLE_QT6=OFF
      - -DWITH_NSS3=OFF
    sources:
      - type: archive
        url: https://poppler.freedesktop.org/poppler-24.11.0.tar.xz
        sha256: FILL_IN  # run: curl -sL <url> | sha256sum

  # ── Python runtime dependencies ─────────────────────────────────────────
  # For local development builds, run flatpak-builder with --allow-net:
  #
  #   flatpak-builder --allow-net --force-clean build-dir \
  #                   io.github.pemsley.Alexandria.yml
  #
  # For Flathub submission, replace this module with the output of
  # flatpak-pip-generator (https://github.com/flatpak/flatpak-pip-generator):
  #
  #   python3 flatpak-pip-generator \
  #       --requirements-file requirements-flatpak.txt \
  #       --output python-deps
  #
  # then add:
  #   - python-deps.json
  # to the top of the modules list and remove this module.
  - name: python-deps
    buildsystem: simple
    build-commands:
      - pip3 install --prefix=/app --no-build-isolation
            bibtexparser pypdf pdfx
    sources: []

  # ── Alexandria ───────────────────────────────────────────────────────────
  - name: alexandria
    buildsystem: simple
    build-commands:
      - pip3 install --prefix=/app --no-deps --no-build-isolation .
      - install -Dm644 data/io.github.pemsley.Alexandria.desktop
            /app/share/applications/io.github.pemsley.Alexandria.desktop
      - install -Dm644 data/io.github.pemsley.Alexandria.svg
            /app/share/icons/hicolor/scalable/apps/io.github.pemsley.Alexandria.svg
      - install -Dm644 data/io.github.pemsley.Alexandria.metainfo.xml
            /app/share/metainfo/io.github.pemsley.Alexandria.metainfo.xml
    sources:
      - type: dir
        path: .
